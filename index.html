<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>The Shattered Crown</title>
<style>
  @font-face { font-family: 'PressStart';
    src: url('lib/press-start-2p.woff2') format('woff2'); }
  html, body { margin: 0; padding: 0; background: #07070d; color: #ccc;
    font-family: monospace; height: 100%; }
  #wrap { display: flex; flex-direction: column; align-items: center; gap: 8px;
    padding-top: 12px; }
  h1 { color: #ffe97f; font-size: 18px; letter-spacing: 3px; margin: 4px 0 0 0;
    text-shadow: 0 2px 0 #000; }
  #game canvas { image-rendering: pixelated; border: 2px solid #2c2c44;
    border-radius: 4px; box-shadow: 0 8px 40px #000; }
  #controls { color: #777799; font-size: 11px; text-align: center; line-height: 1.7; }
  #controls b { color: #aaaacc; }
  #err { position: fixed; bottom: 0; left: 0; right: 0; background: #400;
    color: #fbb; font-size: 11px; padding: 2px 8px; display: none;
    white-space: pre-wrap; max-height: 80px; overflow: auto; }
</style>
</head>
<body>
<div id="wrap">
  <h1>⚔ THE SHATTERED CROWN ⚔</h1>
  <div id="game"></div>
  <div id="controls">
    <b>ARROWS / WASD</b> move &nbsp; <b>SPACE</b> sword + talk + open &nbsp; <b>X</b> use item<br>
    <b>C</b> switch item &nbsp; <b>ENTER</b> pause + inventory + save &nbsp; <b>M</b> mute
  </div>
</div>
<div id="err"></div>
<script>
  window.onerror = function (msg, src, line) {
    var el = document.getElementById('err');
    el.style.display = 'block';
    el.textContent += msg + ' @ ' + (src || '').split('/').pop() + ':' + line + '\n';
  };
</script>

<script src="lib/phaser.min.js"></script>

<!-- engine -->
<script src="src/config.js"></script>
<script src="src/world/tiles.js"></script>
<script src="src/textures.js"></script>
<script src="src/audio.js"></script>
<script src="src/save.js"></script>
<script src="src/items.js"></script>
<script src="src/dialogue.js"></script>
<script src="src/enemies.js"></script>
<script src="src/player.js"></script>
<script src="src/world.js"></script>

<!-- content: art -->
<script src="src/sprites/tile_art.js"></script>
<script src="src/sprites/actor_art.js"></script>
<script src="src/sprites/enemy_art.js"></script>
<script src="src/sprites/item_art.js"></script>

<!-- content: audio, words, beings -->
<script src="src/audio_content.js"></script>
<script src="src/dialogue_content.js"></script>
<script src="src/enemy_types.js"></script>
<script src="src/bosses.js"></script>

<!-- content: world -->
<script src="src/world/regions/meadows.js"></script>
<script src="src/world/regions/forest.js"></script>
<script src="src/world/regions/lake.js"></script>
<script src="src/world/regions/mountains.js"></script>
<script src="src/world/regions/wastes.js"></script>

<!-- scenes -->

<script src="src/scenes/VictoryScene.js"></script>
<script src="src/main.js"></script>
</body>
</html>
